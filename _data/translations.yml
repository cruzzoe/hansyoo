ko:
  nav: {home: 홈, about: 나를 소개해요, gallery: 갤러리, awards: 수상 내역}
  toggle: English
  seo:
    home: {title: "한스 유 | 바닷속 어린이 화가 스튜디오", description: "한스 유가 그린 알록달록한 바닷속 세상과 다정한 친구들, 상상 가득한 그림을 만나 보세요."}
    about: {title: "한스 유 소개 | 한국의 어린이 화가", description: "동물과 모험, 밝고 재미있는 색에서 영감을 얻는 어린이 화가 한스 유를 소개합니다."}
    gallery: {title: "한스 유 그림 갤러리 | 알록달록한 어린이 미술", description: "한스 유의 다채로운 원화와 상상력 가득한 작품을 감상해 보세요."}
    awards: {title: "수상 내역과 기쁜 순간 | 한스 유", description: "한스 유의 수상 내역과 특별한 예술의 순간을 만나 보세요."}
  home:
    eyebrow: 한스 유의 바닷속 스튜디오
    title: 나의 알록달록 바다에 온 걸 환영해요!
    text: 안녕! 나는 한스야. 반짝이는 세상, 다정한 친구들, 그리고 내가 상상하는 모든 것을 그리는 걸 좋아해.
    button: 갤러리로 풍덩!
  about:
    eyebrow: 한스를 더 알아볼까요
    title: 안녕, 나는 한스야!
    intro: 나는 한국에 사는 9살 꼬마 화가야. 머릿속에 재미있는 생각이 떠오르면 언제든 그림을 그려!
    facts:
      - {icon: "🎨", title: "내가 가장 좋아하는 것", text: "신기하고 새로운 색을 섞어 보는 것."}
      - {icon: "✨", title: "나의 영감", text: "동물, 모험, 그리고 재미있는 꿈."}
      - {icon: "🌊", title: "나의 초능력", text: "하얀 종이를 새로운 세상으로 만드는 것."}
  gallery:
    eyebrow: 작품 수족관
    title: 나의 그림 갤러리
    intro: 그림을 누르면 크게 볼 수 있어요. 풍덩!
  awards:
    eyebrow: 반짝이는 별 보물상자
    title: 수상 내역과 기쁜 순간들
    note: 한스의 미술 수상 내역과 성과를 모아 놓았어요.
    items:
      - {icon: "🏆", date: "2026년 7월 1일", title: "제98회 세계아동미술대회 — 최우수상", text: "한국미술교육학회 주최."}
      - {icon: "🌟", date: "2025년 11월 26일", title: "2025년 어린이조선일보 글로벌미술대회 — 장려상", text: "어린이조선일보 & 에듀조선 주최."}
      - {icon: "🎖️", date: "2026년 1월 17일", title: "2026 IAP 루브르 국제미술전 — Honorable Mention Award", text: "작품명: 호랑이의 점심."}
