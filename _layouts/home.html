---
layout: default
---
<section class="hero">
  <div class="hero-copy reveal">
    <p class="eyebrow">{{ site.data.translations[site.active_lang].home.eyebrow }}</p>
    <h1>{{ site.data.translations[site.active_lang].home.title }}</h1>
    <p class="lead">{{ site.data.translations[site.active_lang].home.text }}</p>
    <a class="cta" href="{{ '/gallery/' | relative_url }}">{{ site.data.translations[site.active_lang].home.button }} <span>→</span></a>
  </div>
  <div class="hero-art" aria-hidden="true"><img class="hero-fish" src="{{ '/assets/images/clownfish-hero.png' | relative_url }}" alt=""><div class="small-fish">🐟</div><div class="coral">🪸</div></div>
</section>
