name: Upload GitHub Pages artifact
description: Package site files and upload the artifact consumed by deploy-pages.
inputs:
  path:
    description: Directory to publish.
    required: true
  name:
    description: Artifact name expected by GitHub Pages.
    required: false
    default: github-pages
runs:
  using: composite
  steps:
    - name: Archive site
      shell: bash
      run: tar --dereference --hard-dereference --directory "${{ inputs.path }}" -cvf "$RUNNER_TEMP/artifact.tar" --exclude=.git .
    - name: Upload Pages artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.name }}
        path: ${{ runner.temp }}/artifact.tar
        retention-days: 1
